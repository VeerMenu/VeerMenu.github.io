<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEER Menu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f0ebe0;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }

  .menu-container {
    position: relative;
    width: 100%;
    max-width: 600px;
  }

  .menu-img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Transparent clickable areas over the brush strokes */
  .btn-area {
    position: absolute;
    left: 8%;
    width: 84%;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.2s ease;
  }

  .btn-area:hover {
    background: rgba(255, 255, 255, 0.08);
  }

  /* 
    Image is 1405x2000
    Food Menu brush: roughly y=37% to y=50%
    Alcohol Menu brush: roughly y=58% to y=71%
    Non-Alcoholic brush: roughly y=79% to y=92%
  */

  .btn-food {
    top: 28.7%;
    height: 11.3%;
  }

  .btn-alcohol {
    top: 52.1%;
    height: 11.3%;
  }

  .btn-nonalc {
    top: 75.6%;
    height: 11.3%;
  }
</style>
</head>
<body>

<div class="menu-container">
  <img class="menu-img" src="VEER_Menu.png" alt="VEER Menu">

  <a class="btn-area btn-food"
     href="https://drive.google.com/file/d/1cFDBBx1M2nJbPVhVMR0QvOhb65gxqlCn/preview"
     target="_blank"></a>

  <a class="btn-area btn-alcohol"
     href="https://drive.google.com/file/d/1kwgnq0KFxn1KTxlrkcQeZpD3Kos9tV4q/preview"
     target="_blank"></a>

  <a class="btn-area btn-nonalc"
     href="https://drive.google.com/file/d/1ys977q3OZDpDjmnNO2Cbsf0jr6TexxJ_/preview"
     target="_blank"></a>
</div>

</body>
</html>
